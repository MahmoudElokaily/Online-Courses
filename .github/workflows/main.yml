name: main.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  permissions:
    contents: read
    id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 25

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install Dependencies
        run: pnpm i

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Login to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/online-course:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/online-course:${{ github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/987543081211/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@devops-489201.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials online-course-cluster \
            --zone us-central1-a \
            --project devops-489201
          
      - name: Deploy to GKE
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/online-course:${{ github.sha }}
          kubectl set image deployment/online-course online-course=$IMAGE
          
